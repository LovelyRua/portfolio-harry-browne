name: CI and Cloudflare deploy

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix worker

      - name: Test backend
        run: npm test --prefix backend

      - name: Test and type-check frontend
        run: |
          npm test --prefix frontend
          npm run lint --prefix frontend

      - name: Test and type-check Worker
        run: |
          npm test --prefix worker
          npm run typecheck --prefix worker

      - name: Build backend
        run: npm run build --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Validate Worker bundle
        run: npm run build --prefix worker

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --prefix worker

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Create deployment secrets file
        working-directory: worker
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::Missing JWT_SECRET secret"
            exit 1
          fi
          if [ -z "$RESEND_API_KEY" ] || [ -z "$EMAIL_FROM" ]; then
            echo "::error::Missing RESEND_API_KEY or EMAIL_FROM secret"
            exit 1
          fi
          node -e "require('fs').writeFileSync('.secrets.production.json', JSON.stringify({ JWT_SECRET: process.env.JWT_SECRET, RESEND_API_KEY: process.env.RESEND_API_KEY, EMAIL_FROM: process.env.EMAIL_FROM }))"
          chmod 600 .secrets.production.json

      - name: Apply D1 migrations and deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: 4.103.0
          preCommands: wrangler d1 migrations apply portfolio-harry-browne --remote
          command: deploy --secrets-file .secrets.production.json

      - name: Remove deployment secrets file
        if: always()
        working-directory: worker
        run: rm -f .secrets.production.json
