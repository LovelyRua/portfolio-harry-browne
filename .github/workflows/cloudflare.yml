name: CI and Cloudflare deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            worker/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix worker

      - name: Test backend
        run: npm test --prefix backend

      - name: Test and type-check frontend
        run: |
          npm test --prefix frontend
          npm run lint --prefix frontend

      - name: Test and type-check Worker
        run: |
          npm test --prefix worker
          npm run typecheck --prefix worker

      - name: Build backend
        run: npm run build --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Validate Worker bundle
        run: npm run build --prefix worker

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --prefix worker

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure production D1 database
        working-directory: worker
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "::error::Missing CLOUDFLARE_D1_DATABASE_ID secret"
            exit 1
          fi
          node -e "const fs=require('fs'); const p='wrangler.jsonc'; const c=fs.readFileSync(p,'utf8'); fs.writeFileSync(p,c.replace('00000000-0000-0000-0000-000000000000',process.env.CLOUDFLARE_D1_DATABASE_ID));"

      - name: Apply D1 migrations and deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: 4.102.0
          preCommands: wrangler d1 migrations apply portfolio-harry-browne --remote
          command: deploy
          secrets: |
            JWT_SECRET
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
